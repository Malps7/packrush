function gcd(a,b){return b===0?a:gcd(b,a%b);}
function fmtChance(pct){
  var p=parseFloat(pct);
  if(!p||p<=0)return"0";
  if(p>=1){var g=gcd(Math.round(p),100);var n=Math.round(p)/g,d=100/g;if(n===1)return"1/"+d;return n+"/"+d;}
  return"1/"+Math.round(100/p);
}
function roll(items,luck){
  var w=items.map(i=>i.chance*Math.pow(luck,(RAR[i.rarity]?RAR[i.rarity].t-1:0)*0.32));
  var tot=w.reduce((a,b)=>a+b,0);
  var r=Math.random()*tot;
  for(var i=0;i<items.length;i++){r-=w[i];if(r<=0)return items[i];}
  return items[0];
}
function fmt(n){
  if(n>=1e24)return(n/1e24).toFixed(1)+"Sp";
  if(n>=1e21)return(n/1e21).toFixed(1)+"Si";
  if(n>=1e18)return(n/1e18).toFixed(1)+"Qi";
  if(n>=1e15)return(n/1e15).toFixed(1)+"Qa";
  if(n>=1e12)return(n/1e12).toFixed(1)+"T";
  if(n>=1e9)return(n/1e9).toFixed(1)+"B";
  if(n>=1e6)return(n/1e6).toFixed(1)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"K";
  return String(Math.floor(n));
}

function parseBgStyle(css){
  var obj={};
  css.split(";").filter(Boolean).forEach(s=>{
    var[k,...v]=s.split(":");
    obj[k.trim().replace(/-([a-z])/g,(_,c)=>c.toUpperCase())]=v.join(":").trim();
  });
  return obj;
}

// localStorage based storage (works offline on iOS)
function sLoad(n){
  try{var d=localStorage.getItem("pr7_u:"+n.toLowerCase());return Promise.resolve(d?JSON.parse(d):null);}
  catch(e){return Promise.resolve(null);}
}
function sSave(s){
  if(!s)return Promise.resolve();
  try{
    if(!s.inventory)s.inventory=[];
    if(!s.discovered)s.discovered=[];
    var bi=null;
    if(s.inventory.length>0){
      bi=s.inventory.reduce((best,i)=>{
        if(!i||!best)return i||best;
        var t=RAR[i.rarity]?RAR[i.rarity].t:1,bt=RAR[best.rarity]?RAR[best.rarity].t:1;
        return t>bt||(t===bt&&i.mps>best.mps)?i:best;
      },s.inventory[0]);
    }
    var bd=bi?{name:bi.name,emoji:bi.emoji,rarity:bi.rarity,mps:bi.mps}:null;
    localStorage.setItem("pr7_u:"+s.username.toLowerCase(),JSON.stringify(s));
    var lbData={username:s.username,mps:gMps(s.inventory),best:bd};
    var lbAll=JSON.parse(localStorage.getItem("pr7_lb_all")||"{}");
    lbAll[s.username.toLowerCase()]=lbData;
    localStorage.setItem("pr7_lb_all",JSON.stringify(lbAll));
  }catch(e){}
  return Promise.resolve();
}
function sLb(){
  try{
    var lbAll=JSON.parse(localStorage.getItem("pr7_lb_all")||"{}");
    return Object.values(lbAll).filter(Boolean);
  }catch(e){return[];}
}

  function redeemCode(){
    if(!gs||!promoCode.trim()){setPromoMsg("Enter a code!");return;}
    var code=promoCode.trim().toLowerCase();
    var pr=PROMO_CODES[code];
    if(!pr){setPromoMsg("Invalid code.");return;}
    if(gs.claimedCodes&&gs.claimedCodes.includes(code)){setPromoMsg("Already redeemed!");return;}
    if(gs.inventory.length>=gs.maxSlots){setPromoMsg("Inventory full!");return;}
    var newIt=Object.assign({},pr,{uid:Date.now()+"_promo"});
    setGs(p=>{var np=Object.assign({},p,{inventory:p.inventory.concat([newIt]),discovered:Array.from(new Set(p.discovered.concat([pr.id]))),claimedCodes:(p.claimedCodes||[]).concat([code])});sSave(np);return np;});
    setPromoMsg("Redeemed! "+pr.emoji+" "+pr.name);
    setPromoCode("");
    setRv(newIt);setRp(0);setTimeout(()=>setRp(1),80);setTimeout(()=>setRp(2),700);setTimeout(()=>setRp(3),1400);

  function buildDeck(){
    var pool=[];
    var counts={attack:20,defense:20,nothing:20,token:20,guaranteed_raid:5,timeout:5,free_bg:10};
    Object.keys(counts).forEach(k=>{for(var j=0;j<counts[k];j++)pool.push(k);});
    return pool.slice().sort(()=>Math.random()-.5).slice(0,3);
  }
  function openLuckyDraw(){
    if(!gs)return;
    var last=gs.lastDraw||0;
    if(Date.now()-last<86400000){setLdResult("⏳ Come back in "+Math.ceil((86400000-(Date.now()-last))/3600000)+"h!");setLdOpen(true);setLdCards(null);return;}
    setLdCards(buildDeck());setLdFlipped([]);setLdResult("");setLdOpen(true);
  }
  function flipCard(idx){
    if(!ldCards||ldFlipped.includes(idx)||ldFlipped.length>=1)return;
    setLdFlipped([idx]);
    var result=ldCards[idx];
    setGs(p=>{
      var np=Object.assign({},p,{lastDraw:Date.now()});
      if(result==="attack"){np.pendingAttack=true;setLdResult("⚔️ Attack ready! Go to Trade tab to raid.");}
      else if(result==="defense"){np.defense=Math.min(100,(p.defense||0)+5);setLdResult("🛡️ +5% Defense!");}
      else if(result==="nothing"){setLdResult("😶 Nothing this time.");}
      else if(result==="token"){np.packTokens=(p.packTokens||0)+1;setLdResult("🏆 Free Pack Token!");}
      else if(result==="guaranteed_raid"){np.guaranteedRaid=true;np.pendingAttack=true;setLdResult("🗡️ Guaranteed Raid!");}
      else if(result==="timeout"){np.timeoutUntil=Date.now()+300000;setLdResult("⏸️ Time Out Zone — 5 min.");}
      else if(result==="free_bg"){
        var unowned=BACKGROUNDS.filter(b=>!(p.ownedBgs||[]).includes(b.id));
        if(unowned.length>0){var bg=unowned[Math.floor(Math.random()*unowned.length)];np.ownedBgs=(p.ownedBgs||[]).concat([bg.id]);setLdResult("🎨 Free Background: "+bg.emoji+" "+bg.name+"!");}
        else{np.money=p.money+1e12;setLdResult("🎨 All backgrounds owned! +$1T!");}
      }
      sSave(np);return np;
    });
  }

  function sendTradeOffer(targetUser,itemUid){
    if(!gs||!targetUser.trim())return;
    var it=gs.inventory.find(i=>i.uid===itemUid);if(!it)return;
    var offer={from:gs.username,to:targetUser,item:it,status:"pending",ts:Date.now()};
    localStorage.setItem("pr7_trade:"+targetUser.toLowerCase(),JSON.stringify(offer));
    setTradeMsg("Trade offer sent to "+targetUser+"!");
  }
  function checkTradeInbox(){
    if(!gs)return;
    try{
      var d=JSON.parse(localStorage.getItem("pr7_trade:"+gs.username.toLowerCase())||"null");
      if(d&&d.status==="pending"&&d.to===gs.username&&Date.now()-d.ts<300000)setTradeIncoming(d);
      else setTradeIncoming(null);
    }catch(e){setTradeIncoming(null);}
  }
  function acceptTrade(){
    if(!tradeIncoming||!gs)return;
    var it=tradeIncoming.item;
    if(gs.inventory.length>=gs.maxSlots){setTradeMsg("Inventory full!");return;}
    var newIt=Object.assign({},it,{uid:Date.now()+"_tr"});
    setGs(p=>{var np=Object.assign({},p,{inventory:p.inventory.concat([newIt]),discovered:Array.from(new Set(p.discovered.concat([it.id])))});sSave(np);return np;});
    localStorage.removeItem("pr7_trade:"+gs.username.toLowerCase());
    setTradeIncoming(null);setTradeOffer(null);
    setTradeMsg("Trade complete! "+it.emoji+" "+it.name+" received!");
  }
  function declineTrade(){
    localStorage.removeItem("pr7_trade:"+gs.username.toLowerCase());
    setTradeIncoming(null);setTradeMsg("Trade declined.");
  }

  function executeRaid(targetUser){
    if(!gs||(!gs.pendingAttack&&!gs.guaranteedRaid)){setRaidMsg("No attack ready.");return;}
    // Get all known players from leaderboard
    var allPlayers=sLb().map(e=>e.username).filter(u=>u&&u.toLowerCase()!==gs.username.toLowerCase());
    var target=targetUser.trim()||allPlayers[Math.floor(Math.random()*allPlayers.length)];
    if(!target){setRaidMsg("No players found to raid!");return;}
    var tgtData=null;
    try{tgtData=JSON.parse(localStorage.getItem("pr7_u:"+target.toLowerCase())||"null");}catch(e){}
    if(!tgtData||tgtData.inventory.length===0){setRaidMsg("Target '"+target+"' not found or has no items. Try someone else!");return;}
    var def=tgtData.defense||0;
    var hitChance=gs.guaranteedRaid?1:0.5*(1-def/100);
    var hit=Math.random()<hitChance;
    if(hit){
      var idx=Math.floor(Math.random()*tgtData.inventory.length);
      var stolen=tgtData.inventory[idx];
      tgtData.inventory=tgtData.inventory.filter((_,i)=>i!==idx);
      localStorage.setItem("pr7_u:"+target.toLowerCase(),JSON.stringify(tgtData));
      setGs(p=>{var np=Object.assign({},p,{pendingAttack:false,guaranteedRaid:false,inventory:p.inventory.concat([Object.assign({},stolen,{uid:Date.now()+"_raid"})])});sSave(np);return np;});
      setRaidMsg("⚔️ Raided "+target+"! You stole "+stolen.emoji+" "+stolen.name+" ("+RAR[stolen.rarity]?RAR[stolen.rarity].l:"?"+", $"+fmt(stolen.mps)+"/s)!");
    }else{
      setGs(p=>{var np=Object.assign({},p,{pendingAttack:false,guaranteedRaid:false});sSave(np);return np;});
      setRaidMsg("🛡️ Raid on "+target+" blocked by their defense ("+def+"%)! Better luck next time.");
    }
  }

  function adminGive(){
    if(!gu.trim()){setAm("Enter username");return;}
    var it=ADMIN_ALL_ITEMS.find(i=>i.id===gi);if(!it){setAm("Not found");return;}
    sLoad(gu.trim()).then(tgt=>{
      if(!tgt){setAm("Player not found");return;}
      if(tgt.inventory.length>=tgt.maxSlots){setAm("Their inv full");return;}
      tgt.inventory.push(Object.assign({},it,{uid:Date.now()+"_g"+Math.random()}));
      tgt.discovered=Array.from(new Set(tgt.discovered.concat([it.id])));
      sSave(tgt);
      if(gu.trim().toLowerCase()===gs.username.toLowerCase())setGs(Object.assign({},tgt));
      setAm("Gave "+it.emoji+" "+it.name+" to "+gu.trim());
    });
  }

  function loadAuctions(){
    var a=getAuctions();
    var now=Date.now();
    var active=a.filter(au=>au.expiresAt>now);
    if(active.length!==a.length)saveAuctions(active);
    setAuctions(active);
  }
  function postAuction(){
    if(!gs||!myAuctionItem)return;
    var it=gs.inventory.find(i=>i.uid===myAuctionItem);if(!it){setAuctionMsg("Item not found.");return;}
    var min=parseInt(myAuctionMin)||0;
    var value=Math.round(it.mps*1000);
    var au={id:"au_"+Date.now()+"_"+Math.random().toString(36).slice(2),seller:gs.username,item:it,startingBid:min,currentBid:min,currentBidder:null,value:value,bids:[],postedAt:Date.now(),expiresAt:Date.now()+3600000};
    var list=[...getAuctions().filter(a=>a.seller!==gs.username||a.item.id!==it.id),au];
    saveAuctions(list);
    setGs(p=>{var np=Object.assign({},p,{inventory:p.inventory.filter(i=>i.uid!==it.uid)});sSave(np);return np;});
    setMyAuctionItem(null);setMyAuctionMin("");setAuctionMsg("✅ Auction posted! Item removed from your inventory until sold.");
    loadAuctions();
  }
  function placeBid(auId){
    var bidAmt=parseInt(auctionBid[auId]||"0");
    if(!bidAmt||bidAmt<=0){setAuctionMsg("Enter a valid bid amount.");return;}
    if(gs.money<bidAmt){setAuctionMsg("Not enough money!");return;}
    var list=getAuctions();
    var au=list.find(a=>a.id===auId);
    if(!au){setAuctionMsg("Auction not found.");return;}
    if(au.seller===gs.username){setAuctionMsg("Cannot bid on your own auction!");return;}
    if(bidAmt<=au.currentBid){setAuctionMsg("Bid must exceed current bid of $"+fmt(au.currentBid)+"!");return;}
    // Refund previous bidder (just store note - no real money movement until claim)
    au.bids.push({bidder:gs.username,amount:bidAmt,ts:Date.now()});
    au.currentBid=bidAmt;au.currentBidder=gs.username;
    saveAuctions(list);
    setAuctionBid(p=>Object.assign({},p,{[auId]:""}));
    setAuctionMsg("💰 Bid of $"+fmt(bidAmt)+" placed on "+au.item.name+"!");
    loadAuctions();
  }
  function claimAuctionWin(au){
    if(!gs||au.currentBidder!==gs.username)return;
    if(gs.money<au.currentBid){setAuctionMsg("Not enough money to claim!");return;}
    if(gs.inventory.length>=gs.maxSlots){setAuctionMsg("Inventory full!");return;}
    // Deduct money, give item
    setGs(p=>{var np=Object.assign({},p,{money:p.money-au.currentBid,inventory:p.inventory.concat([Object.assign({},au.item,{uid:Date.now()+"_auclaim"})]),discovered:Array.from(new Set(p.discovered.concat([au.item.id])))});sSave(np);return np;});
    // Give money to seller if they're on same device
    var sellerData=null;try{sellerData=JSON.parse(localStorage.getItem("pr7_u:"+au.seller.toLowerCase())||"null");}catch(e){}
    if(sellerData){sellerData.money=(sellerData.money||0)+au.currentBid;localStorage.setItem("pr7_u:"+au.seller.toLowerCase(),JSON.stringify(sellerData));}
    var list=getAuctions().filter(a=>a.id!==au.id);saveAuctions(list);
    setAuctionMsg("🎉 Claimed "+au.item.emoji+" "+au.item.name+"! $"+fmt(au.currentBid)+" paid.");
    loadAuctions();
  }
  function cancelAuction(au){
    if(!gs||au.seller!==gs.username)return;
    // Return item to seller
    var it=Object.assign({},au.item,{uid:Date.now()+"_auret"});
    setGs(p=>{var np=Object.assign({},p,{inventory:p.inventory.concat([it])});sSave(np);return np;});
    var list=getAuctions().filter(a=>a.id!==au.id);saveAuctions(list);
    setAuctionMsg("Auction cancelled. "+it.emoji+" "+it.name+" returned to inventory.");
    loadAuctions();
  }

  var isA=gs&&(isAdminUser(gs.username)||gs.isDev);

  function login(){
    if(!un.trim())return;
    sLoad(un.trim()).then(s=>{
      if(!s)s={username:un.trim(),money:500,inventory:[],maxSlots:30,slotUps:0,activeLuck:1,luckExpiry:0,discovered:[],claimed:[],packTokens:0,ownedBgs:[],activeBg:null,gdTokens:0,crTokens:0,crCards:{},isDev:false,defense:0,pendingAttack:false,guaranteedRaid:false,timeoutUntil:0,lastDraw:0,claimedCodes:[]};
      if(!s.claimed)s.claimed=[];
      if(!s.discovered)s.discovered=[];
      if(!s.inventory)s.inventory=[];
      if(s.packTokens===undefined)s.packTokens=0;
      if(!s.ownedBgs)s.ownedBgs=[];
      if(s.activeBg===undefined)s.activeBg=null;
      if(s.gdTokens===undefined)s.gdTokens=0;
      if(s.crTokens===undefined)s.crTokens=0;
      if(!s.crCards)s.crCards={};
      if(s.isDev===undefined)s.isDev=false;
      if(s.defense===undefined)s.defense=0;
      if(!s.timeoutUntil)s.timeoutUntil=0;
      if(!s.lastDraw)s.lastDraw=0;
      if(s.pendingAttack===undefined)s.pendingAttack=false;
      if(s.guaranteedRaid===undefined)s.guaranteedRaid=false;
      if(!s.claimedCodes)s.claimedCodes=[];
      setGs(s);setPhase("game");sSave(s);
      var lb=sLb();
      setLM(lb.slice().sort((a,b)=>b.mps-a.mps).slice(0,20));
      setLMRar(lb.slice().sort((a,b)=>{var at=a.best&&RAR[a.best.rarity]?RAR[a.best.rarity].t:0;var bt=b.best&&RAR[b.best.rarity]?RAR[b.best.rarity].t:0;return bt!==at?bt-at:(b.best?b.best.mps:0)-(a.best?a.best.mps:0);}).slice(0,20));
      sEvL();
    });
  }

  function pLk(s){if(!s)return 1;return(s.luckExpiry>Date.now()&&s.activeLuck>1)?s.activeLuck:1;}
  function gLk(){return(gE&&gE.type==="luck"&&gE.expiry>Date.now())?gE.mult:1;}
  function eMul(){return(gE&&gE.type==="frenzy"&&gE.expiry>Date.now())?gE.mult:1;}
  function fPk(){return gE&&gE.type==="freepacks"&&gE.expiry>Date.now();}
  function iRn(){return gE&&gE.type==="moneyrain"&&gE.expiry>Date.now();}
  function tLk(){return pLk(gs)*gLk();}

  useEffect(()=>{
    if(phase!=="game"||!gs)return;
    var iv=setInterval(()=>{
      setGs(p=>{
        if(!p)return p;
        return Object.assign({},p,{money:p.money+gMps(p.inventory)*0.1*eMul()+(iRn()?50:0)});
      });
    },100);
    return()=>clearInterval(iv);
  },[phase,gs?gs.inventory.length:0,gE]);

  useEffect(()=>{
    if(phase!=="game")return;
    var iv=setInterval(()=>{
      setGs(p=>{if(p)sSave(p);return p;});
      sEvL();
      if(tab==="trade")checkTradeInbox();
      if(tab==="chat")loadChat();
    },3000);
    return()=>clearInterval(iv);
  },[phase,tab]);

  function openPk(pi){
    if(!gs)return;
    var pk=PACKS[pi];var cost=fPk()?0:pk.cost;
    if(gs.money<cost||gs.inventory.length>=gs.maxSlots)return;
    var item=roll(pk.items,tLk());
    setGs(p=>{var np=Object.assign({},p,{money:p.money-cost,inventory:p.inventory.concat([Object.assign({},item,{uid:Date.now()+"_"+Math.random()})]),discovered:Array.from(new Set(p.discovered.concat([item.id])))});sSave(np);return np;});
    setRv(item);setRp(0);
    setTimeout(()=>setRp(1),80);setTimeout(()=>setRp(2),700);setTimeout(()=>setRp(3),1400);
  }
  function openMPack(){
    if(!gs||(gs.packTokens||0)<1||gs.inventory.length>=gs.maxSlots)return;
    var item=roll(MPACK,tLk());
    setGs(p=>{var np=Object.assign({},p,{packTokens:p.packTokens-1,inventory:p.inventory.concat([Object.assign({},item,{uid:Date.now()+"_"+Math.random()})]),discovered:Array.from(new Set(p.discovered.concat([item.id])))});sSave(np);return np;});
    setRv(item);setRp(0);setTimeout(()=>setRp(1),80);setTimeout(()=>setRp(2),700);setTimeout(()=>setRp(3),1400);
  }
  function openGdPack(){
    if(!gs||(gs.gdTokens||0)<1||gs.inventory.length>=gs.maxSlots)return;
    var item=roll(GD_REALM,tLk());
    setGs(p=>{var np=Object.assign({},p,{gdTokens:(p.gdTokens||0)-1,inventory:p.inventory.concat([Object.assign({},item,{uid:Date.now()+"_"+Math.random()})]),discovered:Array.from(new Set(p.discovered.concat([item.id])))});sSave(np);return np;});
    setRv(item);setRp(0);setTimeout(()=>setRp(1),80);setTimeout(()=>setRp(2),700);setTimeout(()=>setRp(3),1400);
  }
  function openCrPack(){
    if(!gs||(gs.crTokens||0)<1)return;
    var CR_CARD_POOL=("common,".repeat(48)+"uncommon,".repeat(13)+"rare,".repeat(10)+"puzzle,".repeat(8)+"epic,".repeat(6)+"legend,".repeat(4)+"mythic,".repeat(3)+"tuff,".repeat(2)+"acoustic,".repeat(2)+"secret,divine,cosmic,transcendent,corrupt").split(",").filter(Boolean);
    var earned={};
    for(var j=0;j<10;j++){var rar=CR_CARD_POOL[Math.floor(Math.random()*CR_CARD_POOL.length)];earned[rar]=(earned[rar]||0)+1;}
    setGs(p=>{var cards=Object.assign({},p.crCards||{});Object.entries(earned).forEach(([rar,cnt])=>{cards[rar]=(cards[rar]||0)+cnt;});var np=Object.assign({},p,{crTokens:(p.crTokens||0)-1,crCards:cards});sSave(np);return np;});
    var lines=Object.entries(earned).sort((a,b)=>(RAR[b[0]]?RAR[b[0]].t:0)-(RAR[a[0]]?RAR[a[0]].t:0)).map(([r,n])=>{var rc=RAR[r];return(rc?rc.l:"?")+": "+n+" card"+(n>1?"s":"");});
    setMm("🃏 CR Pack opened! "+lines.join(" · "));setTimeout(()=>setMm(""),6000);

            {bsRewardMsg&&<div style={{background:"rgba(220,38,38,.1)",border:"1px solid rgba(220,38,38,.3)",borderRadius:10,padding:"10px 14px",color:"#ef4444",fontWeight:700,fontSize:12,marginBottom:10}}>{bsRewardMsg}</div>}
            <h3 style={{fontSize:13,fontWeight:800,color:"#fbbf24",marginBottom:8}}>🏆 Pack Completions & La Combinasions</h3>
            <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:16}}>

              {/* Bestiary rewards — discover all pack items */}
              {bsRewardStatus.map(rs=>{
                var pct=rs.packItems.filter(it=>disc.has(it.id)).length,tot=rs.packItems.length,prog=Math.round(pct/tot*100);
                return <div key={rs.packName} style={{background:rs.claimed?"rgba(34,197,94,.05)":rs.allDisc?"rgba(220,38,38,.08)":"#0b0f1a",border:"2px solid "+(rs.claimed?"rgba(34,197,94,.25)":rs.allDisc?"rgba(220,38,38,.35)":"#141d2d"),borderRadius:12,padding:"12px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:22}}>{rs.rw.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:rs.claimed?"#22c55e":rs.allDisc?"#ef4444":"#ff69b4",fontWeight:800,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rs.rw.name}</div>
                      <div style={{fontSize:9,color:"#4a5568",marginTop:1}}>Discover all {rs.packName} items · {pct}/{tot} · ${fmt(rs.rw.mps)}/s</div>
                    </div>
                    {rs.claimed?<span style={{fontSize:15}}>✅</span>:rs.allDisc?<button className="ssb" style={{fontSize:10,padding:"7px 12px",whiteSpace:"nowrap"}} onClick={()=>claimBestiaryReward(rs.packName)}>Claim!</button>:<span style={{fontSize:10,color:"#3a4060"}}>🔒</span>}
                  </div>
                  <div style={{height:4,borderRadius:4,background:"#141d2d",overflow:"hidden"}}><div style={{height:"100%",width:prog+"%",background:rs.claimed?"#22c55e":rs.allDisc?"#ef4444":"#fbbf24",transition:"width .4s"}}></div></div>
                </div>;
              })}

              {/* All La Combinasions — crafted by collecting items */}
              {LA_COMBINASIONS.filter(la=>la.inputs&&la.inputs.length>0).map(la=>{
                var owned=gs.inventory.some(i=>i.id===la.id)||disc.has(la.id);
                var got=la.inputs.filter(inp=>disc.has(inp)).length;
                var tot=la.inputs.length;
                var prog=Math.round(got/tot*100);
                var ready=got===tot&&!owned;
                return <div key={la.id} onClick={()=>setBsSel(Object.assign({},la,{rarity:"special",chance:null}))} style={{background:owned?"rgba(255,105,180,.05)":ready?"rgba(255,105,180,.08)":"#0b0f1a",border:"2px solid "+(owned?"rgba(255,105,180,.3)":ready?"rgba(255,105,180,.4)":"rgba(255,105,180,.08)"),borderRadius:12,padding:"12px 14px",cursor:"pointer",touchAction:"manipulation"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:22,flexShrink:0}}>{la.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:owned?"#22c55e":ready?"#ff69b4":"#c084fc",fontWeight:800,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{la.name}</div>
                      <div style={{fontSize:9,color:"#4a5568",marginTop:1}}>Craft from {tot} items · {got}/{tot} collected · ${fmt(la.mps)}/s</div>
                    </div>
                    {owned?<span style={{fontSize:15}}>✅</span>:ready?<span style={{fontSize:11,color:"#ff69b4",fontWeight:700}}>CRAFT!</span>:<span style={{fontSize:10,color:"#3a4060"}}>›</span>}
                  </div>
                  <div style={{height:4,borderRadius:4,background:"#141d2d",overflow:"hidden"}}><div style={{height:"100%",width:prog+"%",background:owned?"#22c55e":ready?"#ff69b4":"#c084fc",transition:"width .4s"}}></div></div>
                </div>;
              })}
            </div>

            {/* Entity Browser */}
            <h3 style={{fontSize:13,fontWeight:800,color:"#e2e8f0",marginBottom:8}}>🔍 Browse Entities</h3>
            <input className="ain" placeholder="Search entities..." value={bsSearch} onChange={e=>setBsSearch(e.target.value)} style={{marginBottom:8}}/>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
              {bsPacks.map(p=><button key={p} className={"pst"+(bsFilter===p?" on":"")} onClick={()=>{setBsFilter(p);setBsSearch("");}}>{p}</button>)}
            </div>

            {/* Per-pack progress bar */}
            {bsFilter!=="All"&&(()=>{
              var packMap={"Indie Pack":PACK1,"Character Pack":PACK2,"Meme Pack":PACK3,"Chemical Pack":PACK_CHEM,"GD Realm":GD_REALM,"CR Realm":CR_REALM,"Tech Pack":PACK_TECH,"Cookery Pack":PACK_COOK,"Milestone Pack":MPACK,"Bot Realm":BOT_ITEMS};
              var packItems=packMap[bsFilter]||[];
              if(packItems.length===0)return null;
              var pct=packItems.filter(it=>disc.has(it.id)).length,tot=packItems.length;
              return <div style={{background:"#0a0e18",border:"1px solid #141d2d",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontSize:11,color:"#94a3b8",fontWeight:700}}>{bsFilter} Progress</span>
                  <span style={{fontSize:11,color:pct===tot?"#22c55e":"#fbbf24",fontWeight:700}}>{pct}/{tot} discovered</span>
                </div>
                <div style={{height:5,borderRadius:5,background:"#141d2d",overflow:"hidden"}}><div style={{height:"100%",width:(pct/tot*100)+"%",background:pct===tot?"#22c55e":"#fbbf24",transition:"width .4s"}}></div></div>
              </div>;
            })()}

            {bsFiltered.length===0
              ?<div className="empty">Nothing found</div>
              :<div style={{display:"flex",flexDirection:"column",gap:4}}>
                {bsFiltered.map(e=>{var r=RAR[e.rarity]||RAR.common;var discovered=disc.has(e.id);return <div key={e.id} onClick={()=>setBsSel(e)} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:10,border:"1px solid "+(discovered?r.c+"33":"#141d2d"),background:discovered?r.bg:"#0b0f1a",cursor:"pointer",opacity:discovered?1:.65,touchAction:"manipulation"}}>
                  <span style={{fontSize:22,flexShrink:0}}>{discovered?e.emoji:"❓"}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:discovered?r.c:"#3a4560",fontWeight:700,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{discovered?e.name:"???"}</div>
                    <div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>
                      <span style={{fontSize:9,color:r.c,background:r.bg,border:"1px solid "+r.c+"33",borderRadius:4,padding:"1px 5px",fontWeight:700}}>{r.l}</span>
                      <span style={{fontSize:9,color:"#4a5568"}}>{e.pack}</span>
                      {e.chance&&<span style={{fontSize:9,color:"#4a5568"}}>{fmtChance(e.chance)}</span>}
                      {e.mps&&<span style={{fontSize:9,color:"#586578"}}>${fmt(e.mps)}/s</span>}
                    </div>
                  </div>
                  <span style={{fontSize:14,color:"#3a4060",flexShrink:0}}>›</span>
                </div>;})}
              </div>
            }
          </div>
        )}

        {/* AUCTION TAB */}
        {tab==="auction"&&(
          <div style={{maxWidth:600,margin:"0 auto"}}>
            <h2 style={{fontSize:18,fontWeight:800,color:"#e2e8f0",marginBottom:2}}>🔨 Auction House</h2>
            <p style={{color:"#4a5568",fontSize:11,marginBottom:12}}>List items for auction. Item value = $/s × 1000. Auctions expire in 1 hour.</p>
            {auctionMsg&&<div style={{background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.25)",borderRadius:8,padding:"8px 12px",color:"#fbbf24",fontSize:11,fontWeight:600,marginBottom:10,animation:"fadeIn .3s"}}>{auctionMsg}</div>}
            {mm&&<div className="mmsg">{mm}</div>}

            {/* Post Auction */}
            <div style={{background:"#0b0f1a",border:"1px solid rgba(251,191,36,.2)",borderRadius:14,padding:16,marginBottom:16}}>
              <h3 style={{color:"#fbbf24",fontSize:13,fontWeight:700,marginBottom:10}}>📤 Post an Auction</h3>
              {sI.length===0?<p style={{color:"#3a4060",fontSize:11}}>No items to auction.</p>:<div>
                <p style={{fontSize:10,color:"#4a5568",marginBottom:6}}>Select item to auction (it will be removed from your inventory):</p>
                <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:160,overflowY:"auto",marginBottom:8}}>
                  {sI.map(it=>{var r=RAR[it.rarity]||RAR.common;var sel=myAuctionItem===it.uid;return <div key={it.uid} onClick={()=>setMyAuctionItem(sel?null:it.uid)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,border:"2px solid "+(sel?r.c:"#141d2d"),background:sel?r.bg+"aa":"#0a0e18",cursor:"pointer",touchAction:"manipulation",minHeight:44}}>
                    <span style={{fontSize:14}}>{it.emoji}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{color:r.c,fontSize:11,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.name}</div>
                      <div style={{fontSize:9,color:"#586578"}}>Value: ${fmt(it.mps*1000)} · ${fmt(it.mps)}/s</div>
                    </div>
                    {sel&&<span style={{color:r.c,fontSize:12}}>✓</span>}
                  </div>;})}
                </div>
                {myAuctionItem&&(()=>{var it=sI.find(i=>i.uid===myAuctionItem);if(!it)return null;return <div>
                  <div style={{background:"rgba(251,191,36,.06)",border:"1px solid rgba(251,191,36,.15)",borderRadius:8,padding:"8px 12px",marginBottom:8,fontSize:11,color:"#94a3b8"}}>
                    Selected: <b style={{color:"#fbbf24"}}>{it.emoji} {it.name}</b> — Market value: <b style={{color:"#22c55e"}}>${fmt(it.mps*1000)}</b>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <input className="ain" style={{flex:1,marginBottom:0}} placeholder="Starting bid ($)..." value={myAuctionMin} onChange={e=>setMyAuctionMin(e.target.value)} type="number" min="0"/>
                    <button className="ssb" style={{flexShrink:0,background:"linear-gradient(135deg,#92400e,#fbbf24)"}} onClick={postAuction}>🔨 Post</button>
                  </div>
                </div>;})()}
              </div>}
            </div>

            {/* Live Auctions */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <h3 style={{color:"#e2e8f0",fontSize:13,fontWeight:700}}>🏪 Live Auctions ({auctions.length})</h3>
              <button className="ssb" style={{fontSize:10,padding:"6px 12px"}} onClick={loadAuctions}>🔄 Refresh</button>
            </div>
            {auctions.length===0
              ?<div style={{background:"#0b0f1a",border:"1px solid #141d2d",borderRadius:12,padding:24,textAlign:"center"}}>
                <div style={{fontSize:36,marginBottom:8}}>🔨</div>
                <p style={{color:"#3a4060",fontSize:12}}>No active auctions. Be the first to list!</p>
              </div>
              :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                {auctions.map(au=>{
                  var r=RAR[au.item.rarity]||RAR.common;
                  var isMine=au.seller===gs.username;
                  var isWinner=au.currentBidder===gs.username;
                  var timeLeft=Math.max(0,au.expiresAt-Date.now());
                  var tlMin=Math.floor(timeLeft/60000),tlSec=Math.floor((timeLeft%60000)/1000);
                  var expired=timeLeft===0;
                  return <div key={au.id} style={{background:isMine?"rgba(251,191,36,.04)":r.bg,border:"2px solid "+(isMine?"rgba(251,191,36,.3)":isWinner?"rgba(34,197,94,.3)":r.c+"22"),borderRadius:14,padding:14,opacity:expired?.6:1}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
                      <span style={{fontSize:28,flexShrink:0}}>{au.item.emoji}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{color:r.c,fontWeight:800,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{au.item.name}</div>
                        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:2}}>
                          <span style={{fontSize:9,color:r.c,background:r.bg,border:"1px solid "+r.c+"33",borderRadius:4,padding:"1px 5px",fontWeight:700}}>{r.l}</span>
                          <span style={{fontSize:9,color:"#586578"}}>${fmt(au.item.mps)}/s</span>
                          <span style={{fontSize:9,color:"#94a3b8"}}>by {au.seller}</span>
                          <span style={{fontSize:9,color:expired?"#ef4444":tlMin<5?"#f59e0b":"#4a5568"}}>{expired?"EXPIRED":tlMin+"m "+tlSec+"s left"}</span>
                        </div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                      <div style={{flex:1,background:"#0a0e18",border:"1px solid #141d2d",borderRadius:8,padding:"8px 10px",minWidth:100}}>
                        <div style={{fontSize:8,color:"#4a5568",marginBottom:2}}>MARKET VALUE</div>
                        <div style={{fontSize:12,color:"#fbbf24",fontWeight:700}}>${fmt(au.value)}</div>
                      </div>
                      <div style={{flex:1,background:"#0a0e18",border:"1px solid "+(au.currentBidder?"rgba(34,197,94,.2)":"#141d2d"),borderRadius:8,padding:"8px 10px",minWidth:100}}>
                        <div style={{fontSize:8,color:"#4a5568",marginBottom:2}}>{au.currentBidder?"TOP BID":"STARTING BID"}</div>
                        <div style={{fontSize:12,color:au.currentBidder?"#22c55e":"#94a3b8",fontWeight:700}}>${fmt(au.currentBid)}</div>
                        {au.currentBidder&&<div style={{fontSize:8,color:"#4a5568",marginTop:1}}>by {au.currentBidder}</div>}
                      </div>
                      <div style={{flex:1,background:"#0a0e18",border:"1px solid #141d2d",borderRadius:8,padding:"8px 10px",minWidth:80}}>
                        <div style={{fontSize:8,color:"#4a5568",marginBottom:2}}>BIDS</div>
                        <div style={{fontSize:12,color:"#94a3b8",fontWeight:700}}>{au.bids.length}</div>
                      </div>
                    </div>
                    {!expired&&!isMine&&(
                      <div style={{display:"flex",gap:6}}>
                        <input className="ain" style={{flex:1,marginBottom:0,fontSize:14}} placeholder={"Bid > $"+fmt(au.currentBid)+"..."} value={auctionBid[au.id]||""} onChange={e=>setAuctionBid(p=>Object.assign({},p,{[au.id]:e.target.value}))} type="number" min={au.currentBid+1}/>
                        <button className="ssb" style={{flexShrink:0,background:"linear-gradient(135deg,#15803d,#22c55e)"}} onClick={()=>placeBid(au.id)}>💰 Bid</button>
                      </div>
                    )}
                    {isWinner&&expired&&(
                      <button className="ssb" style={{width:"100%",background:"linear-gradient(135deg,#15803d,#22c55e)"}} onClick={()=>claimAuctionWin(au)}>🎉 Claim {au.item.emoji} {au.item.name} for ${fmt(au.currentBid)}</button>
                    )}
                    {isMine&&!expired&&(
                      <button className="ssb" style={{width:"100%",background:"rgba(239,68,68,.2)",color:"#ef4444",border:"1px solid rgba(239,68,68,.3)"}} onClick={()=>cancelAuction(au)}>✕ Cancel Auction (returns item)</button>
                    )}
                    {isMine&&expired&&au.currentBidder&&(
                      <div style={{background:"rgba(34,197,94,.06)",border:"1px solid rgba(34,197,94,.2)",borderRadius:8,padding:"8px 10px",fontSize:11,color:"#22c55e",fontWeight:600}}>✅ Sold to {au.currentBidder} for ${fmt(au.currentBid)}! (They must claim)</div>
                    )}
                    {isMine&&expired&&!au.currentBidder&&(
                      <button className="ssb" style={{width:"100%",background:"rgba(100,116,139,.2)",color:"#94a3b8"}} onClick={()=>cancelAuction(au)}>No bids — reclaim item</button>
                    )}
                  </div>;
                })}
              </div>
            }
          </div>
        )}

        {/* TRADE TAB */}
        {tab==="trade"&&(
          <div style={{maxWidth:560,margin:"0 auto"}}>
            <h2 style={{fontSize:18,fontWeight:800,color:"#e2e8f0",marginBottom:4}}>🤝 Trade & Raid</h2>
            {tradeMsg&&<div style={{background:"rgba(34,197,94,.08)",border:"1px solid rgba(34,197,94,.2)",borderRadius:8,padding:"7px 10px",color:"#22c55e",fontSize:11,fontWeight:600,marginBottom:10}}>{tradeMsg}</div>}
            {raidMsg&&<div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:8,padding:"7px 10px",color:"#ef4444",fontSize:11,fontWeight:600,marginBottom:10}}>{raidMsg}</div>}
            {tradeIncoming&&<div style={{background:"rgba(251,191,36,.08)",border:"2px solid rgba(251,191,36,.3)",borderRadius:14,padding:16,marginBottom:14}}>
              <h3 style={{color:"#fbbf24",fontSize:14,fontWeight:700,marginBottom:8}}>📥 Trade from {tradeIncoming.from}</h3>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:9,border:"1px solid "+(RAR[tradeIncoming.item.rarity]?RAR[tradeIncoming.item.rarity].c+"33":"#141d2d"),background:RAR[tradeIncoming.item.rarity]?RAR[tradeIncoming.item.rarity].bg:"#0b0f1a",marginBottom:10}}>
                <span style={{fontSize:22}}>{tradeIncoming.item.emoji}</span>
                <div><div style={{color:RAR[tradeIncoming.item.rarity]?RAR[tradeIncoming.item.rarity].c:"#e2e8f0",fontWeight:700,fontSize:13}}>{tradeIncoming.item.name}</div><div style={{fontSize:10,color:"#586578"}}>${fmt(tradeIncoming.item.mps)}/s</div></div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button className="ssb" style={{flex:1,background:"linear-gradient(135deg,#15803d,#22c55e)"}} onClick={acceptTrade}>✅ Accept</button>
                <button className="ssb" style={{flex:1,background:"linear-gradient(135deg,#991b1b,#ef4444)"}} onClick={declineTrade}>❌ Decline</button>
              </div>
            </div>}
            <div style={{background:"#0b0f1a",border:"1px solid #141d2d",borderRadius:14,padding:16,marginBottom:12}}>
              <h3 style={{color:"#e2e8f0",fontSize:13,fontWeight:700,marginBottom:8}}>📤 Send Trade Offer</h3>
              <input className="ain" placeholder="Target username..." value={tradePartner} onChange={e=>setTradePartner(e.target.value)} autoCapitalize="none"/>
              <p style={{fontSize:10,color:"#4a5568",marginBottom:6}}>Select item to trade:</p>
              <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:180,overflowY:"auto"}}>
                {sI.map(it=>{var r=RAR[it.rarity]||RAR.common;var sel=tradeOffer&&tradeOffer.uid===it.uid;return <div key={it.uid} onClick={()=>setTradeOffer(it)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",borderRadius:8,border:"2px solid "+(sel?r.c:"#141d2d"),background:sel?r.bg+"aa":"#0a0e18",cursor:"pointer",touchAction:"manipulation",minHeight:44}}>
                  <span style={{fontSize:14}}>{it.emoji}</span>
                  <div style={{flex:1}}><div style={{color:r.c,fontSize:11,fontWeight:700}}>{it.name}</div><div style={{fontSize:9,color:"#586578"}}>${fmt(it.mps)}/s</div></div>
                  {sel&&<span style={{color:r.c,fontSize:10}}>✓</span>}
                </div>;})}
              </div>
              {tradeOffer&&tradePartner.trim()&&(
                <button className="ssb" style={{width:"100%",marginTop:10}} onClick={()=>sendTradeOffer(tradePartner,tradeOffer.uid)}>📤 Send {tradeOffer.emoji} {tradeOffer.name} → {tradePartner}</button>
              )}
            </div>
            {gs.pendingAttack&&<div style={{background:"rgba(239,68,68,.06)",border:"2px solid rgba(239,68,68,.25)",borderRadius:14,padding:16}}>
              <h3 style={{color:"#ef4444",fontSize:14,fontWeight:700,marginBottom:4}}>⚔️ Attack Ready!{gs.guaranteedRaid?" (GUARANTEED)":""}</h3>
              <p style={{color:"#586578",fontSize:10,marginBottom:8}}>50% to steal a random item, reduced by their defense.</p>
              <input className="ain" placeholder="Target username..." value={raidTarget} onChange={e=>setRaidTarget(e.target.value)} autoCapitalize="none"/>
              <button className="ssb" style={{width:"100%",background:"linear-gradient(135deg,#991b1b,#ef4444)"}} onClick={()=>executeRaid(raidTarget)}>⚔️ Launch Raid</button>
            </div>}
          </div>
        )}

        {/* CHAT TAB */}
        {tab==="chat"&&(
          <div style={{maxWidth:560,margin:"0 auto",display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
            <div style={{marginBottom:10}}>
              <h2 style={{fontSize:18,fontWeight:800,color:"#e2e8f0",marginBottom:2}}>💬 Global Chat</h2>
              <p style={{color:"#4a5568",fontSize:10}}>Chat with other players. (Shared on this device's browser storage)</p>
            </div>
            <div style={{flex:1,overflowY:"auto",background:"#0b0f1a",border:"1px solid #141d2d",borderRadius:12,padding:12,marginBottom:10,display:"flex",flexDirection:"column",gap:6,minHeight:200}}>
              {chatLog.length===0
                ?<div style={{color:"#2a3040",fontSize:12,textAlign:"center",padding:20}}>No messages yet. Say something!</div>
                :chatLog.map((m,i)=>{var isMe=m.user===gs.username;return <div key={i} style={{display:"flex",gap:6,alignItems:"flex-start",flexDirection:isMe?"row-reverse":"row"}}>
                  <div style={{flexShrink:0,width:26,height:26,borderRadius:"50%",background:isMe?"rgba(251,191,36,.2)":"rgba(56,189,248,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:isMe?"#fbbf24":"#38bdf8"}}>{m.user[0].toUpperCase()}</div>
                  <div style={{maxWidth:"76%"}}>
                    <div style={{fontSize:9,color:isMe?"#fbbf24":"#38bdf8",fontWeight:700,marginBottom:2,...(isMe?{textAlign:"right"}:{})}}>{m.dev?"👑 ":""}{m.user}</div>
                    <div style={{background:isMe?"rgba(251,191,36,.1)":"rgba(255,255,255,.04)",border:"1px solid "+(isMe?"rgba(251,191,36,.2)":"#141d2d"),borderRadius:isMe?"12px 12px 2px 12px":"12px 12px 12px 2px",padding:"7px 11px",fontSize:12,color:"#e2e8f0",lineHeight:1.5,wordBreak:"break-word"}}>{m.text}</div>
                  </div>
                </div>;})}
            </div>
            <div style={{display:"flex",gap:6}}>
              <input className="ain" style={{flex:1,marginBottom:0}} placeholder="Say something..." value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sendChat();}} maxLength={200}/>
              <button className="mscb" style={{flexShrink:0,padding:"10px 18px"}} onClick={sendChat}>→</button>
            </div>
          </div>
        )}

        {/* SHOP TAB */}
        {tab==="shop"&&(
          <div style={{maxWidth:500,margin:"0 auto"}}>
            <h2 style={{fontSize:18,fontWeight:800,color:"#e2e8f0",marginBottom:14}}>🛒 Shop</h2>
            <div className="ss">
              <h3 style={{fontSize:14,color:"#e2e8f0",marginBottom:4}}>📦 +1 Inventory Slot</h3>
              <p style={{color:"#4a5568",fontSize:10,marginBottom:8}}>{gs.maxSlots}/200 slots</p>
              {gs.maxSlots<200
                ?<button className="ssb" onClick={bSlot} disabled={gs.money<sP(gs.slotUps)}>${fmt(sP(gs.slotUps))}</button>
                :<div style={{color:"#fbbf24",fontSize:11,fontWeight:600}}>MAX SLOTS</div>
              }
            </div>
            <div className="ss">
              <h3 style={{fontSize:14,color:"#e2e8f0",marginBottom:4,display:"flex",alignItems:"center",gap:5}}>🍀 Luck <span style={{fontSize:8,background:"rgba(251,191,36,.12)",color:"#fbbf24",padding:"2px 6px",borderRadius:4,fontWeight:700}}>60s</span></h3>
              <div className="slg">
                {LT.map((m,i)=>{var af=gs.money>=LP[i],ac=ml===m&&ll>0;return <button key={i} className={"sli"+(ac?" act":"")} onClick={()=>bLuck(i)} disabled={!af}>
                  <div style={{fontWeight:800,fontSize:13,color:LC[i]}}>{m}x</div>
                  <div style={{fontSize:8,color:ac?"#fbbf24":"#4a5568",marginTop:1}}>{ac?lSec+"s":"$"+fmt(LP[i])}</div>
                </button>;})}
              </div>
            </div>
            <div className="ss">
              <h3 style={{fontSize:14,color:"#e2e8f0",marginBottom:4,display:"flex",alignItems:"center",gap:5}}>🎴 Lucky Draw <span style={{fontSize:8,background:"rgba(251,191,36,.12)",color:"#fbbf24",padding:"2px 6px",borderRadius:4,fontWeight:700}}>DAILY</span></h3>
              <p style={{color:"#4a5568",fontSize:10,marginBottom:8}}>Flip one of three face-down cards. Each hides a random reward.</p>
              <div style={{background:"#0a0e18",border:"1px solid #141d2d",borderRadius:10,padding:"8px 10px",marginBottom:8,fontSize:9,color:"#586578",lineHeight:1.6}}>⚔️ Attack 20% · 🛡️ +5% Defense 20% · 😶 Nothing 20% · 🏆 Token 20% · 🗡️ Guaranteed Raid 5% · ⏸️ Timeout 5% · 🎨 Free BG 10%</div>
              <button className="ssb" style={{width:"100%"}} onClick={openLuckyDraw}>🎴 Open Daily Draw</button>
            </div>
            <div className="ss">
              <h3 style={{fontSize:14,color:"#e2e8f0",marginBottom:4,display:"flex",alignItems:"center",gap:5}}>🎫 Promo Code <span style={{fontSize:8,background:"rgba(192,132,252,.12)",color:"#c084fc",padding:"2px 6px",borderRadius:4,fontWeight:700}}>FREE ITEM</span></h3>
              {promoMsg&&<div style={{background:"rgba(34,197,94,.08)",border:"1px solid rgba(34,197,94,.2)",borderRadius:8,padding:"7px 10px",color:"#22c55e",fontSize:11,fontWeight:600,marginBottom:8}}>{promoMsg}</div>}
              <div style={{display:"flex",gap:6}}>
                <input className="ain" style={{flex:1,marginBottom:0}} placeholder="Enter code..." value={promoCode} onChange={e=>setPromoCode(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")redeemCode();}} maxLength={30} autoCapitalize="none"/>
                <button className="ssb" style={{flexShrink:0}} onClick={redeemCode}>🎫 Redeem</button>
              </div>
            </div>
            <div className="ss">
              <h3 style={{fontSize:14,color:"#e2e8f0",marginBottom:4,display:"flex",alignItems:"center",gap:5}}>🎨 Backgrounds <span style={{fontSize:8,background:"rgba(192,132,252,.12)",color:"#c084fc",padding:"2px 6px",borderRadius:4,fontWeight:700}}>${fmt(BG_COST)} each</span></h3>
              <p style={{color:"#4a5568",fontSize:10,marginBottom:10}}>Hand-crafted atmospheric themes. Tap owned to equip/unequip.</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(145px,1fr))",gap:8,marginBottom:12}}>
                {BACKGROUNDS.map(bg=>{
                  var owned=ownedBgs.includes(bg.id),active=gs.activeBg===bg.id,canBuy=gs.money>=BG_COST;
                  var bgPrev=parseBgStyle(bg.css);
                  return <div key={bg.id} onClick={()=>owned?setBg(bg.id):null} style={{borderRadius:12,border:"2px solid "+(active?"#c084fc":owned?"rgba(251,191,36,.4)":"#1a2030"),background:active?"rgba(192,132,252,.08)":owned?"rgba(251,191,36,.04)":"#080c16",padding:10,cursor:owned?"pointer":"default",touchAction:owned?"manipulation":"none"}}>
                    <div style={{...bgPrev,width:"100%",height:80,borderRadius:10,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,boxShadow:"inset 0 0 30px rgba(0,0,0,.7)",position:"relative",...(active?{outline:"2px solid #c084fc",outlineOffset:2}:{}),...(owned&&!active?{outline:"2px solid rgba(251,191,36,.5)",outlineOffset:2}:{})}}>{bg.emoji}</div>
                    <div style={{color:owned?"#e2e8f0":"#586578",fontWeight:700,fontSize:11,marginBottom:2}}>{bg.name}</div>
                    <div style={{color:"#3a4560",fontSize:9,lineHeight:1.4,marginBottom:5,minHeight:24}}>{bg.desc}</div>
                    {active&&<div style={{fontSize:9,color:"#c084fc",fontWeight:700,marginBottom:4}}>✓ Active</div>}
                    {owned&&!active&&<div style={{fontSize:9,color:"#fbbf24",fontWeight:600,marginBottom:4}}>Owned — tap to equip</div>}
                    {!owned&&<button className="ssb" style={{width:"100%",fontSize:10,padding:"7px",touchAction:"manipulation"}} onClick={e=>{e.stopPropagation();buyBg(bg.id);}} disabled={!canBuy}>${fmt(BG_COST)}</button>}
                  </div>;
                })}
              </div>

              {/* Custom Background */}
              <div style={{background:"rgba(192,132,252,.06)",border:"1px solid rgba(192,132,252,.2)",borderRadius:12,padding:14,marginBottom:8}}>
                <h4 style={{color:"#c084fc",fontSize:12,fontWeight:700,marginBottom:4,display:"flex",alignItems:"center",gap:5}}>🖼️ Custom Background <span style={{fontSize:8,color:"#4a5568",fontWeight:400}}>FREE — image URL or upload</span></h4>
                <p style={{color:"#4a5568",fontSize:9,marginBottom:10,lineHeight:1.5}}>Paste a direct image URL (ending .jpg/.png/.gif/.webp) or upload a file from your device.</p>
                {customBgPreview&&<div style={{width:"100%",height:80,borderRadius:10,marginBottom:10,backgroundImage:"url("+customBgPreview+")",backgroundSize:"cover",backgroundPosition:"center",border:"1px solid rgba(192,132,252,.3)"}}></div>}
                <div style={{display:"flex",gap:6,marginBottom:6}}>
                  <input className="ain" style={{flex:1,marginBottom:0,fontSize:13}} placeholder="https://example.com/image.jpg" value={customBgUrl} onChange={e=>{setCustomBgUrl(e.target.value);if(e.target.value.trim())setCustomBgPreview(e.target.value.trim());}}/>
                  <button className="ssb" style={{flexShrink:0,background:"linear-gradient(135deg,#4c1d95,#c084fc)"}} onClick={()=>{if(customBgPreview){setGs(p=>{var np=Object.assign({},p,{activeBg:"__custom__",customBgCss:"background:url('"+customBgPreview+"') center/cover no-repeat,#06080e"});sSave(np);return np;});}}}>Apply</button>
                </div>
                <label style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:8,border:"1px dashed rgba(192,132,252,.3)",background:"rgba(192,132,252,.03)",cursor:"pointer",touchAction:"manipulation",fontSize:11,color:"#c084fc",fontWeight:600}}>
                  📁 Upload Image File
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{var f=e.target.files[0];if(!f)return;var url=URL.createObjectURL(f);setCustomBgPreview(url);setCustomBgUrl(f.name);}}/>
                </label>
                {customBgPreview&&<button style={{marginTop:6,width:"100%",padding:"8px",borderRadius:8,border:"1px solid rgba(192,132,252,.2)",background:"none",color:"#4a5568",fontSize:10,cursor:"pointer"}} onClick={()=>{setCustomBgPreview("");setCustomBgUrl("");}}>Clear Preview</button>}
              </div>

              {gs.activeBg&&<button style={{marginTop:4,width:"100%",padding:"10px",borderRadius:8,border:"1px solid #1a2535",background:"rgba(255,255,255,.03)",color:"#64748b",fontSize:11,cursor:"pointer",touchAction:"manipulation"}} onClick={()=>setGs(p=>{var np=Object.assign({},p,{activeBg:null,customBgCss:null});sSave(np);return np;})}>Remove Background</button>}
            </div>
          </div>
        )}

        {/* LEADERBOARD TAB */}
        {tab==="leaderboard"&&(
          <div style={{maxWidth:680,margin:"0 auto"}}>
            <h2 style={{fontSize:18,fontWeight:800,color:"#e2e8f0",marginBottom:4}}>🏆 Leaderboard</h2>
            <p style={{color:"#4a5568",fontSize:10,marginBottom:12}}>Local leaderboard — players on this device</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div className="lcl">
                <h3 style={{fontSize:12,fontWeight:700,color:"#fbbf24",marginBottom:8,textAlign:"center"}}>💰 $/sec</h3>
                {lM.length===0
                  ?<div className="empty">—</div>
                  :lM.map((e,i)=>(
                    <div key={i} className={"lrow"+(e.username&&e.username.toLowerCase()===gs.username.toLowerCase()?" me":"")}>
                      <span style={{width:22,textAlign:"center",fontWeight:700,color:"#4a5568",fontSize:10,flexShrink:0}}>{i<3?["🥇","🥈","🥉"][i]:"#"+(i+1)}</span>
                      <span className="lnm">{isAdminUser(e.username)?"👑 "+e.username:e.username}</span>
                      <span className="lvl">${fmt(e.mps)}/s</span>
                    </div>
                  ))
                }
              </div>
              <div className="lcl">
                <h3 style={{fontSize:12,fontWeight:700,color:"#c084fc",marginBottom:8,textAlign:"center"}}>💎 Rarest Item</h3>
                {lMRar.length===0
                  ?<div className="empty">—</div>
                  :lMRar.map((e,i)=>(
                    <div key={i} className={"lrow"+(e.username&&e.username.toLowerCase()===gs.username.toLowerCase()?" me":"")}>
                      <span style={{width:22,textAlign:"center",fontWeight:700,color:"#4a5568",fontSize:10,flexShrink:0}}>{i<3?["🥇","🥈","🥉"][i]:"#"+(i+1)}</span>
                      <span className="lnm">{e.username}</span>
                      {e.best?<span style={{display:"flex",alignItems:"center",gap:2,flexShrink:0,maxWidth:70}}>
                        <span style={{fontSize:12}}>{e.best.emoji}</span>
                        <span style={{color:RAR[e.best.rarity]?RAR[e.best.rarity].c:"#fff",fontSize:8,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.best.name}</span>
                      </span>:<span style={{color:"#3a4060",fontSize:9}}>—</span>}
                    </div>
                  ))
                }
              </div>
            </div>
          </div>
        )}

        {/* ADMIN TAB */}
        {tab==="admin"&&isA&&(
          <div style={{maxWidth:540,margin:"0 auto"}}>
            <h2 style={{fontSize:18,fontWeight:800,color:"#ef4444",marginBottom:8}}>{gs.isDev?"👑 Dev Panel":"👑 Admin"}</h2>
            {am&&<div className="amsg">{am}</div>}
            <div className="as">
              <h3 style={{fontSize:12,color:"#e2e8f0",marginBottom:5}}>🎁 Give Item</h3>
              <input className="ain" placeholder="Username..." value={gu} onChange={e=>setGu(e.target.value)} autoCapitalize="none"/>
              <input className="ain" placeholder="Search items... (name, rarity, pack)" value={adminItemSearch} onChange={e=>{setAdminItemSearch(e.target.value);}} style={{marginBottom:6}}/>
              {(()=>{
                var q=adminItemSearch.trim().toLowerCase();
                var filtered=ADMIN_ALL_ITEMS.filter(it=>{
                  if(!q)return true;
                  var r=RAR[it.rarity]?RAR[it.rarity].l.toLowerCase():"";
                  var packName=(PACKS.find(p=>p.items&&p.items.some(i=>i.id===it.id))||{name:""}).name.toLowerCase();
                  return it.name.toLowerCase().includes(q)||r.includes(q)||packName.includes(q)||it.id.includes(q);
                });
                var groups={};
                filtered.forEach(it=>{
                  var grp=PACK1.some(i=>i.id===it.id)?"🎮 Indie Pack":
                           PACK2.some(i=>i.id===it.id)?"🧑 Character Pack":
                           PACK3.some(i=>i.id===it.id)?"🤡 Meme Pack":
                           MPACK.some(i=>i.id===it.id)?"💎 Milestone Pack":
                           BOT_ITEMS.some(i=>i.id===it.id)?"🤖 Bot Realm":
                           PACK_CHEM.some(i=>i.id===it.id)?"⚗️ Chemical Pack":
                           GD_REALM.some(i=>i.id===it.id)?"🎵 GD Realm":
                           CR_REALM.some(i=>i.id===it.id)?"🏆 CR Realm":
                           PACK_TECH.some(i=>i.id===it.id)?"💻 Tech Pack":
                           PACK_COOK.some(i=>i.id===it.id)?"🍳 Cookery Pack":
                           "✨ Special / Crafted";
                  if(!groups[grp])groups[grp]=[];
                  groups[grp].push(it);
                });
                var total=filtered.length;
                return <div>
                  <div style={{fontSize:9,color:"#4a5568",marginBottom:6}}>{total} item{total!==1?"s":""} — {gi?("Selected: "+(ADMIN_ALL_ITEMS.find(i=>i.id===gi)||{name:"none"}).name):"tap to select"}</div>
                  <div style={{maxHeight:220,overflowY:"auto",borderRadius:8,border:"1px solid #141d2d",background:"#080c16"}}>
                    {Object.entries(groups).map(([grpName,items])=><div key={grpName}>
                      <div style={{padding:"5px 10px",fontSize:9,fontWeight:700,color:"#4a5568",background:"#060a10",borderBottom:"1px solid #0e1420",position:"sticky",top:0}}>{grpName} ({items.length})</div>
                      {items.map(it=>{
                        var r=RAR[it.rarity]||{c:"#ff69b4",l:"Special"};
                        var sel=gi===it.id;
                        return <div key={it.id} onClick={()=>setGi(it.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:"1px solid #0a0e18",background:sel?"rgba(251,191,36,.08)":"transparent",cursor:"pointer",touchAction:"manipulation",borderLeft:sel?"2px solid #fbbf24":"2px solid transparent"}}>
                          <span style={{fontSize:16,flexShrink:0}}>{it.emoji}</span>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{color:sel?"#fbbf24":r.c,fontSize:11,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.name}</div>
                            <div style={{fontSize:8,color:"#3a4560"}}>{r.l} · ${fmt(it.mps)}/s</div>
                          </div>
                          {sel&&<span style={{color:"#fbbf24",fontSize:12,flexShrink:0}}>✓</span>}
                        </div>;
                      })}
                    </div>)}
                    {total===0&&<div style={{padding:16,textAlign:"center",color:"#3a4060",fontSize:11}}>No items match</div>}
                  </div>
                </div>;
              })()}
              <button className="abt ab2" onClick={adminGive} style={{marginTop:8,minHeight:40,width:"100%",fontSize:12}}>
                {gi?(()=>{var it=ADMIN_ALL_ITEMS.find(i=>i.id===gi);return it?("Give "+it.emoji+" "+it.name+(gu.trim()?" → "+gu.trim():"")):"Give Item";})():"Give Item"}
              </button>
            </div>
            {[
              {t:"💰 Self Money",b:[{l:"+$1M",f:()=>{setGs(p=>{var np=Object.assign({},p,{money:p.money+1e6});sSave(np);return np;});setAm("+1M");}},{l:"+$1T",f:()=>{setGs(p=>{var np=Object.assign({},p,{money:p.money+1e12});sSave(np);return np;});setAm("+1T");},s:"ab2"},{l:"+$1Qi",f:()=>{setGs(p=>{var np=Object.assign({},p,{money:p.money+1e18});sSave(np);return np;});setAm("+1Qi");},s:"ab3"},{l:"+$1Sp",f:()=>{setGs(p=>{var np=Object.assign({},p,{money:p.money+1e24});sSave(np);return np;});setAm("+1Sp");},s:"ab3"}]},
              {t:"🏆 Pack Tokens",b:[{l:"+1",f:()=>{setGs(p=>{var np=Object.assign({},p,{packTokens:(p.packTokens||0)+1});sSave(np);return np;});setAm("+1 token");}},{l:"+5",f:()=>{setGs(p=>{var np=Object.assign({},p,{packTokens:(p.packTokens||0)+5});sSave(np);return np;});setAm("+5 tokens");},s:"ab2"}]},
              {t:"🎮 GD Tokens",b:[{l:"+1",f:()=>{setGs(p=>{var np=Object.assign({},p,{gdTokens:(p.gdTokens||0)+1});sSave(np);return np;});setAm("+1 GD");}},{l:"+10",f:()=>{setGs(p=>{var np=Object.assign({},p,{gdTokens:(p.gdTokens||0)+10});sSave(np);return np;});setAm("+10 GD");},s:"ab2"}]},
              {t:"🃏 CR Tokens",b:[{l:"+1",f:()=>{setGs(p=>{var np=Object.assign({},p,{crTokens:(p.crTokens||0)+1});sSave(np);return np;});setAm("+1 CR");}},{l:"+10",f:()=>{setGs(p=>{var np=Object.assign({},p,{crTokens:(p.crTokens||0)+10});sSave(np);return np;});setAm("+10 CR");},s:"ab2"}]},
              {t:"🃏 CR Cards (+50 each)",b:[{l:"Give All",f:()=>{setGs(p=>{var cards=Object.assign({},p.crCards||{});["common","uncommon","rare","puzzle","epic","legend","mythic","tuff","acoustic","secret","divine","cosmic","transcendent","corrupt"].forEach(r=>{cards[r]=(cards[r]||0)+50;});var np=Object.assign({},p,{crCards:cards});sSave(np);return np;});setAm("+50 each card");}},{l:"Max All",f:()=>{setGs(p=>{var cards=Object.assign({},p.crCards||{});["common","uncommon","rare","puzzle","epic","legend","mythic","tuff","acoustic","secret","divine","cosmic","transcendent","corrupt"].forEach(r=>{cards[r]=(cards[r]||0)+999;});var np=Object.assign({},p,{crCards:cards});sSave(np);return np;});setAm("+999 all");},s:"ab3"}]},
              {t:"🍀 Luck Event",b:[{l:"10x 3m",f:()=>sEvS({type:"luck",mult:10,expiry:Date.now()+180000,by:gs.username})},{l:"100x 1m",f:()=>sEvS({type:"luck",mult:100,expiry:Date.now()+60000,by:gs.username}),s:"ab3"}]},
              {t:"🔥 Frenzy",b:[{l:"10x 2m",f:()=>sEvS({type:"frenzy",mult:10,expiry:Date.now()+120000,by:gs.username}),s:"ab2"},{l:"100x 1m",f:()=>sEvS({type:"frenzy",mult:100,expiry:Date.now()+60000,by:gs.username}),s:"ab3"}]},
              {t:"🎁 Free Packs",b:[{l:"3min",f:()=>sEvS({type:"freepacks",expiry:Date.now()+180000,by:gs.username})},{l:"10min",f:()=>sEvS({type:"freepacks",expiry:Date.now()+600000,by:gs.username}),s:"ab2"}]},
              {t:"🗑️ Wipe Self Inv",b:[{l:"Wipe",f:()=>{setGs(p=>{var np=Object.assign({},p,{inventory:[]});sSave(np);return np;});setAm("Wiped own inventory.");},s:"ab3"}]},
              {t:"🛑 End Event",b:[{l:"Clear",f:sEvC}]},
            ].map((s,i)=>(
              <div key={i} className="as">
                <h3 style={{fontSize:12,color:"#e2e8f0",marginBottom:5}}>{s.t}</h3>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {s.b.map((b,j)=><button key={j} className={"abt "+(b.s||"")} onClick={b.f}>{b.l}</button>)}
                </div>
              </div>
            ))}
          </div>
        )}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
