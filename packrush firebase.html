<script>
// PackRush multiplayer
// ADMIN: Replace the URL below with your Firebase Realtime Database URL

// This project is already set up — just works!
const PACKRUSH_DB_URL="https://packrush-game-live-default-rtdb.asia-southeast1.firebasedatabase.app";
window.FB_OK=false;
window.db=null;
(function(){
  var url="";
  try{url=localStorage.getItem("pr7_fburl")||"";}catch(e){}
  if(!url)url=PACKRUSH_DB_URL;
  if(!url||(!url.includes("firebaseio")&&!url.includes("firebasedatabase")))return;
  try{
    if(typeof firebase==="undefined")return;
    if(!firebase.apps.length){
      firebase.initializeApp({
        apiKey:"AIzaSyD-packrush-public",
        databaseURL:url,
        projectId:"packrush-game-live"
      });
    }
    window.db=firebase.database();
    window.db.ref(".info/connected").on("value",function(s){window.FB_OK=!!s.val();});
  }catch(e){window.FB_OK=false;}
})();
</script>

const ADMIN_ALL_ITEMS=(()=>{
  var base=[...ALL_ITEMS];
  var crafted=RECIPES.map(r=>r.output);
  var laCombo=LA_COMBINASIONS.filter(la=>!crafted.some(c=>c.id===la.id)).map(la=>Object.assign({},la,{recipe:true}));
  var bsRewards=Object.values(BESTIARY_REWARDS).filter(r=>!crafted.some(c=>c.id===r.id)&&!laCombo.some(l=>l.id===r.id));
  var promos=Object.values(PROMO_CODES);
  var seen=new Set();
  return [...base,...crafted,...laCombo,...bsRewards,...promos].filter(it=>{
    if(!it||!it.id)return false;
    if(seen.has(it.id))return false;
    seen.add(it.id);
    return true;
  });
})();

function gcd(a,b){return b===0?a:gcd(b,a%b);}
function fmtChance(pct){
  var p=parseFloat(pct);
  if(!p||p<=0)return"0";
  if(p>=1){var g=gcd(Math.round(p),100);var n=Math.round(p)/g,d=100/g;if(n===1)return"1/"+d;return n+"/"+d;}
  return"1/"+Math.round(100/p);
}
function roll(items,luck){
  var w=items.map(i=>i.chance*Math.pow(luck,(RAR[i.rarity]?RAR[i.rarity].t-1:0)*0.32));
  var tot=w.reduce((a,b)=>a+b,0);
  var r=Math.random()*tot;
  for(var i=0;i<items.length;i++){r-=w[i];if(r<=0)return items[i];}
  return items[0];
}
function fmt(n){
  if(n>=1e36)return(n/1e36).toFixed(1)+"Ud";
  if(n>=1e33)return(n/1e33).toFixed(1)+"Dc";
  if(n>=1e30)return(n/1e30).toFixed(1)+"No";
  if(n>=1e27)return(n/1e27).toFixed(1)+"Oc";
  if(n>=1e24)return(n/1e24).toFixed(1)+"Sp";
  if(n>=1e21)return(n/1e21).toFixed(1)+"Si";
  if(n>=1e18)return(n/1e18).toFixed(1)+"Qi";
  if(n>=1e15)return(n/1e15).toFixed(1)+"Qa";
  if(n>=1e12)return(n/1e12).toFixed(1)+"T";
  if(n>=1e9)return(n/1e9).toFixed(1)+"B";
  if(n>=1e6)return(n/1e6).toFixed(1)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"K";
  return String(Math.floor(n));
}
function gMps(inv){return (inv||[]).reduce((s,i)=>s+(i&&i.mps?i.mps:0),0);}
function sP(n){return Math.floor(500*Math.pow(2,n));}
function getLosName(plural,mergeLevel){var suffix=mergeLevel>1?" "+ROMAN[Math.min(mergeLevel-1,9)]:"";return"Los "+plural+suffix;}
function parseBgStyle(css){
  var obj={};
  css.split(";").filter(Boolean).forEach(s=>{
    var[k,...v]=s.split(":");
    obj[k.trim().replace(/-([a-z])/g,(_,c)=>c.toUpperCase())]=v.join(":").trim();
  });
  return obj;
}

function sLoad(n){
  var key=n.toLowerCase();
  if(window.FB_OK&&window.db){
    return window.db.ref("players/"+key).get().then(snap=>{
      if(snap.exists()){var d=snap.val();if(typeof d==="string")d=JSON.parse(d);return d;}
      // fallback to localStorage
      try{var loc=localStorage.getItem("pr7_u:"+key);return loc?JSON.parse(loc):null;}catch(e){return null;}
    }).catch(()=>{
      try{var loc=localStorage.getItem("pr7_u:"+key);return loc?JSON.parse(loc):null;}catch(e){return null;}
    });
  }
  try{var d=localStorage.getItem("pr7_u:"+key);return Promise.resolve(d?JSON.parse(d):null);}
  catch(e){return Promise.resolve(null);}
}
function sSave(s){
  if(!s)return Promise.resolve();
  try{
    if(!s.inventory)s.inventory=[];
    if(!s.discovered)s.discovered=[];
    var bi=null;
    if(s.inventory.length>0){
      bi=s.inventory.reduce((best,i)=>{
        if(!i||!best)return i||best;
        var t=RAR[i.rarity]?RAR[i.rarity].t:1,bt=RAR[best.rarity]?RAR[best.rarity].t:1;
        return t>bt||(t===bt&&i.mps>best.mps)?i:best;
      },s.inventory[0]);
    }
    var bd=bi?{name:bi.name,emoji:bi.emoji,rarity:bi.rarity,mps:bi.mps}:null;
    var lbData={username:s.username,mps:gMps(s.inventory),best:bd};
    // Always save to localStorage as backup
    try{
      localStorage.setItem("pr7_u:"+s.username.toLowerCase(),JSON.stringify(s));
      var lbAll=JSON.parse(localStorage.getItem("pr7_lb_all")||"{}");
      lbAll[s.username.toLowerCase()]=lbData;
      localStorage.setItem("pr7_lb_all",JSON.stringify(lbAll));
    }catch(e){}
    // Save to Firebase
    if(window.FB_OK&&window.db){
      window.db.ref("players/"+s.username.toLowerCase()).set(s).catch(()=>{});
      window.db.ref("leaderboard/"+s.username.toLowerCase()).set(lbData).catch(()=>{});
    }
  }catch(e){}
  return Promise.resolve();
}

              <h3 style={{fontSize:12,color:"#e2e8f0",marginBottom:5}}>🎁 Give Item</h3>
              <input className="ain" placeholder="Username..." value={gu} onChange={e=>setGu(e.target.value)} autoCapitalize="none"/>
              <input className="ain" placeholder="Search items... (name, rarity, pack)" value={adminItemSearch} onChange={e=>{setAdminItemSearch(e.target.value);}} style={{marginBottom:6}}/>
              {(()=>{
                var q=adminItemSearch.trim().toLowerCase();
                var filtered=ADMIN_ALL_ITEMS.filter(it=>{
                  if(!q)return true;
                  var r=RAR[it.rarity]?RAR[it.rarity].l.toLowerCase():"";
                  var packName=(PACKS.find(p=>p.items&&p.items.some(i=>i.id===it.id))||{name:""}).name.toLowerCase();
                  return it.name.toLowerCase().includes(q)||r.includes(q)||packName.includes(q)||it.id.includes(q);
                });
                var groups={};
                filtered.forEach(it=>{
                  var grp=PACK1.some(i=>i.id===it.id)?"🎮 Indie Pack":
                           PACK2.some(i=>i.id===it.id)?"🧑 Character Pack":
                           PACK3.some(i=>i.id===it.id)?"🤡 Meme Pack":
                           MPACK.some(i=>i.id===it.id)?"💎 Milestone Pack":
                           BOT_ITEMS.some(i=>i.id===it.id)?"🤖 Bot Realm":
                           PACK_CHEM.some(i=>i.id===it.id)?"⚗️ Chemical Pack":
                           GD_REALM.some(i=>i.id===it.id)?"🎵 GD Realm":
                           CR_REALM.some(i=>i.id===it.id)?"🏆 CR Realm":
                           PACK_TECH.some(i=>i.id===it.id)?"💻 Tech Pack":
                           PACK_COOK.some(i=>i.id===it.id)?"🍳 Cookery Pack":
                           PACK_WEB.some(i=>i.id===it.id)?"🌐 Website Pack":
                           "✨ Special / Crafted";
                  if(!groups[grp])groups[grp]=[];
                  groups[grp].push(it);
                });
                var total=filtered.length;
                return <div>
                  <div style={{fontSize:9,color:"#4a5568",marginBottom:6}}>{total} item{total!==1?"s":""} — {gi?("Selected: "+(ADMIN_ALL_ITEMS.find(i=>i.id===gi)||{name:"none"}).name):"tap to select"}</div>
                  <div style={{maxHeight:220,overflowY:"auto",borderRadius:8,border:"1px solid #141d2d",background:"#080c16"}}>
                    {Object.entries(groups).map(([grpName,items])=><div key={grpName}>
                      <div style={{padding:"5px 10px",fontSize:9,fontWeight:700,color:"#4a5568",background:"#060a10",borderBottom:"1px solid #0e1420",position:"sticky",top:0}}>{grpName} ({items.length})</div>
                      {items.map(it=>{
                        var r=RAR[it.rarity]||{c:"#ff69b4",l:"Special"};
                        var sel=gi===it.id;
                        return <div key={it.id} onClick={()=>setGi(it.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:"1px solid #0a0e18",background:sel?"rgba(251,191,36,.08)":"transparent",cursor:"pointer",touchAction:"manipulation",borderLeft:sel?"2px solid #fbbf24":"2px solid transparent"}}>
                          <span style={{fontSize:16,flexShrink:0}}>{it.emoji}</span>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{color:sel?"#fbbf24":r.c,fontSize:11,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.name}</div>
                            <div style={{fontSize:8,color:"#3a4560"}}>{r.l} · ${fmt(it.mps)}/s</div>
                          </div>
                          {sel&&<span style={{color:"#fbbf24",fontSize:12,flexShrink:0}}>✓</span>}
                        </div>;
                      })}
                    </div>)}
                    {total===0&&<div style={{padding:16,textAlign:"center",color:"#3a4060",fontSize:11}}>No items match</div>}
                  </div>
                </div>;
              })()}
              <button className="abt ab2" onClick={adminGive} style={{marginTop:8,minHeight:40,width:"100%",fontSize:12}}>
                {gi?(()=>{var it=ADMIN_ALL_ITEMS.find(i=>i.id===gi);return it?("Give "+it.emoji+" "+it.name+(gu.trim()?" → "+gu.trim():"")):"Give Item";})():"Give Item"}
              </button>
            </div>
            {[
              {t:"💰 Self Money",b:[{l:"+$1M",f:()=>{setGs(p=>{var np=Object.assign({},p,{money:p.money+1e6});sSave(np);return np;});setAm("+1M");}},{l:"+$1T",f:()=>{setGs(p=>{var np=Object.assign({},p,{money:p.money+1e12});sSave(np);return np;});setAm("+1T");},s:"ab2"},{l:"+$1Qi",f:()=>{setGs(p=>{var np=Object.assign({},p,{money:p.money+1e18});sSave(np);return np;});setAm("+1Qi");},s:"ab3"},{l:"+$1Sp",f:()=>{setGs(p=>{var np=Object.assign({},p,{money:p.money+1e24});sSave(np);return np;});setAm("+1Sp");},s:"ab3"}]},
              {t:"🏆 Pack Tokens",b:[{l:"+1",f:()=>{setGs(p=>{var np=Object.assign({},p,{packTokens:(p.packTokens||0)+1});sSave(np);return np;});setAm("+1 token");}},{l:"+5",f:()=>{setGs(p=>{var np=Object.assign({},p,{packTokens:(p.packTokens||0)+5});sSave(np);return np;});setAm("+5 tokens");},s:"ab2"}]},
              {t:"🎮 GD Tokens",b:[{l:"+1",f:()=>{setGs(p=>{var np=Object.assign({},p,{gdTokens:(p.gdTokens||0)+1});sSave(np);return np;});setAm("+1 GD");}},{l:"+10",f:()=>{setGs(p=>{var np=Object.assign({},p,{gdTokens:(p.gdTokens||0)+10});sSave(np);return np;});setAm("+10 GD");},s:"ab2"}]},
              {t:"🃏 CR Tokens",b:[{l:"+1",f:()=>{setGs(p=>{var np=Object.assign({},p,{crTokens:(p.crTokens||0)+1});sSave(np);return np;});setAm("+1 CR");}},{l:"+10",f:()=>{setGs(p=>{var np=Object.assign({},p,{crTokens:(p.crTokens||0)+10});sSave(np);return np;});setAm("+10 CR");},s:"ab2"}]},
              {t:"🃏 CR Cards (+50 each)",b:[{l:"Give All",f:()=>{setGs(p=>{var cards=Object.assign({},p.crCards||{});["common","uncommon","rare","puzzle","epic","legend","mythic","tuff","acoustic","secret","divine","cosmic","transcendent","corrupt"].forEach(r=>{cards[r]=(cards[r]||0)+50;});var np=Object.assign({},p,{crCards:cards});sSave(np);return np;});setAm("+50 each card");}},{l:"Max All",f:()=>{setGs(p=>{var cards=Object.assign({},p.crCards||{});["common","uncommon","rare","puzzle","epic","legend","mythic","tuff","acoustic","secret","divine","cosmic","transcendent","corrupt"].forEach(r=>{cards[r]=(cards[r]||0)+999;});var np=Object.assign({},p,{crCards:cards});sSave(np);return np;});setAm("+999 all");},s:"ab3"}]},
              {t:"🍀 Luck Event",b:[{l:"10x 3m",f:()=>sEvS({type:"luck",mult:10,expiry:Date.now()+180000,by:gs.username})},{l:"100x 1m",f:()=>sEvS({type:"luck",mult:100,expiry:Date.now()+60000,by:gs.username}),s:"ab3"}]},
              {t:"🔥 Frenzy",b:[{l:"10x 2m",f:()=>sEvS({type:"frenzy",mult:10,expiry:Date.now()+120000,by:gs.username}),s:"ab2"},{l:"100x 1m",f:()=>sEvS({type:"frenzy",mult:100,expiry:Date.now()+60000,by:gs.username}),s:"ab3"}]},
              {t:"🎁 Free Packs",b:[{l:"3min",f:()=>sEvS({type:"freepacks",expiry:Date.now()+180000,by:gs.username})},{l:"10min",f:()=>sEvS({type:"freepacks",expiry:Date.now()+600000,by:gs.username}),s:"ab2"}]},
              {t:"🗑️ Wipe Self Inv",b:[{l:"Wipe",f:()=>{setGs(p=>{var np=Object.assign({},p,{inventory:[]});sSave(np);return np;});setAm("Wiped own inventory.");},s:"ab3"}]},
              {t:"🛑 End Event",b:[{l:"Clear",f:sEvC}]},
            ].map((s,i)=>(
              <div key={i} className="as">
                <h3 style={{fontSize:12,color:"#e2e8f0",marginBottom:5}}>{s.t}</h3>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {s.b.map((b,j)=><button key={j} className={"abt "+(b.s||"")} onClick={b.f}>{b.l}</button>)}
                </div>
              </div>
            ))}
            {/* Promo Codes List */}
            <div className="as">
              <h3 style={{fontSize:12,color:"#c084fc",marginBottom:8}}>🎫 All Promo Codes</h3>
              <p style={{fontSize:9,color:"#4a5568",marginBottom:8}}>Share these with players to announce codes!</p>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {Object.entries(PROMO_CODES).map(([code,item])=>{
                  var r=RAR[item.rarity]||{c:"#ff69b4",l:"Special"};
                  return <div key={code} style={{background:"#0a0e18",border:"1px solid "+r.c+"33",borderRadius:8,padding:"8px 10px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                      <span style={{fontSize:16}}>{item.emoji}</span>
                      <div style={{flex:1}}>
                        <div style={{color:r.c,fontWeight:700,fontSize:11}}>{item.name}</div>
                        <div style={{fontSize:9,color:"#4a5568"}}>{r.l} · ${fmt(item.mps)}/s</div>
                      </div>
                    </div>
                    <div style={{background:"#060a10",border:"1px solid #1a2535",borderRadius:6,padding:"5px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <span style={{fontFamily:"monospace",fontSize:11,color:"#fbbf24",letterSpacing:1}}>"{code}"</span>
                      <button onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(code);setAm("Copied: "+code);}} style={{fontSize:9,padding:"2px 8px",borderRadius:4,border:"1px solid rgba(251,191,36,.3)",background:"none",color:"#fbbf24",cursor:"pointer",touchAction:"manipulation"}}>Copy</button>
                    </div>
                  </div>;
                })}
              </div>
            </div>
          </div>
        )}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>


</body></html>
